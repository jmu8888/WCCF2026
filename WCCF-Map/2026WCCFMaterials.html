<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>2026 华盛顿中国文化节 · 分区物料清单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1E2A4A;
  --ink-soft:#4A5568;
  --muted:#6B7280;
  --bg:#F8F4EC;
  --surface:#FFFFFF;
  --terracotta:#C9745B;
  --terracotta-soft:rgba(201,116,91,0.14);
  --terracotta-deep:#A55C46;
  --sage:#7BA697;
  --hairline:#E5DCC9;
  --hairline-soft:#F1ECDF;
  --shadow-sm:0 1px 2px rgba(30,42,74,0.06);
  --shadow-md:0 8px 28px rgba(30,42,74,0.08);
  --radius:8px;
  --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.view[hidden]{display:none !important;}

/* === Home === */
.home{max-width:1400px;margin:0 auto;padding:32px 24px 80px;}
.home-header{text-align:center;margin-bottom:28px;}
.home-eyebrow{
  display:inline-block;font-size:11px;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--terracotta);
  font-weight:600;margin-bottom:14px;
}
.home-title{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(22px,3.6vw,34px);
  font-weight:700;color:var(--ink);
  letter-spacing:-0.01em;margin-bottom:10px;line-height:1.25;
}
.home-meta{
  display:flex;justify-content:center;align-items:center;gap:14px;
  font-size:13px;color:var(--muted);flex-wrap:wrap;
}
.home-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--hairline);}
.home-subtitle{
  margin-top:14px;font-size:14px;color:var(--muted);
}
.home-subtitle kbd{
  display:inline-block;padding:2px 7px;background:var(--surface);
  border:1px solid var(--hairline);border-bottom-width:2px;
  border-radius:4px;font-family:inherit;font-size:12px;color:var(--ink);
}

/* === Map === */
.map-wrap{
  position:relative;background:var(--surface);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow-md);border:1px solid var(--hairline);
}
.map-img{display:block;width:100%;height:auto;}
.hotspots{position:absolute;inset:0;pointer-events:none;}
.hotspot{
  position:absolute;
  left:var(--l);top:var(--t);width:var(--w);height:var(--h);
  pointer-events:auto;cursor:pointer;
  background:transparent;border:2px solid transparent;
  border-radius:8px;padding:0;font-family:inherit;
  transition:background-color 0.18s ease,border-color 0.18s ease,box-shadow 0.18s ease;
}
.hotspot:hover,.hotspot:focus-visible{
  background:var(--terracotta-soft);
  border-color:var(--terracotta);
  outline:none;
  box-shadow:0 0 0 4px rgba(201,116,91,0.10);
}
.hotspot .hs-label{
  position:absolute;left:50%;bottom:calc(100% + 10px);
  transform:translateX(-50%) translateY(4px);
  background:var(--ink);color:#fff;
  padding:6px 10px;border-radius:6px;
  font-size:12px;font-weight:500;white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity 0.18s ease,transform 0.18s ease;
  z-index:10;
}
.hotspot .hs-label::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--ink);
}
.hotspot:hover .hs-label,
.hotspot:focus-visible .hs-label{
  opacity:1;transform:translateX(-50%) translateY(0);
}

/* === All-zones list (under the map) === */
.zone-section{margin-top:36px;}
.zone-section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  padding-bottom:10px;margin-bottom:14px;
  border-bottom:1px solid var(--hairline);
}
.zone-section-title{
  font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--muted);font-weight:600;
}
.zone-section-hint{font-size:12px;color:var(--muted);}
.zone-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:10px;
}
.zone-card{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--surface);
  border:1px solid var(--hairline);border-radius:var(--radius);
  text-align:left;cursor:pointer;color:var(--ink);
  font-family:inherit;font-size:inherit;
  transition:border-color 0.15s ease,transform 0.15s ease,box-shadow 0.15s ease;
}
.zone-card:hover,.zone-card:focus-visible{
  border-color:var(--terracotta);
  transform:translateY(-1px);
  box-shadow:var(--shadow-sm);outline:none;
}
.chip{
  flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  min-width:34px;height:26px;padding:0 10px;
  border-radius:13px;font-family:'Inter',sans-serif;
  font-weight:600;font-size:11.5px;letter-spacing:0.04em;
  background:var(--terracotta-soft);color:var(--terracotta-deep);
}
.zc-text{display:flex;flex-direction:column;gap:1px;min-width:0;}
.zc-name{font-size:14px;font-weight:500;line-height:1.3;}
.zc-sub{font-size:11.5px;color:var(--muted);}

/* === Detail === */
.detail{max-width:880px;margin:0 auto;padding:32px 24px 80px;}
.detail-header{
  display:flex;align-items:flex-start;gap:18px;margin-bottom:28px;
}
.home-btn{
  flex:0 0 auto;width:46px;height:46px;
  border-radius:12px;border:1px solid var(--hairline);
  background:var(--surface);color:var(--ink);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all 0.15s ease;box-shadow:var(--shadow-sm);
}
.home-btn:hover,.home-btn:focus-visible{
  border-color:var(--terracotta);color:var(--terracotta);
  transform:translateY(-1px);outline:none;
}
.home-btn:active{transform:translateY(0);}
.home-btn svg{width:20px;height:20px;}
.detail-title-block{flex:1;min-width:0;}
.detail-eyebrow{
  display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;
}
.detail-chip{
  display:inline-block;padding:5px 14px;border-radius:999px;
  background:var(--terracotta);color:#fff;
  font-family:'Inter',sans-serif;font-weight:600;
  font-size:12px;letter-spacing:0.04em;
}
.detail-code{
  font-family:'Inter',monospace;font-size:12px;
  color:var(--muted);letter-spacing:0.04em;
}
.detail-name{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(22px,3.4vw,30px);font-weight:700;
  color:var(--ink);letter-spacing:-0.01em;
  line-height:1.2;margin-bottom:8px;
}
.detail-note{font-size:14px;color:var(--muted);line-height:1.55;}

.materials-card{
  background:var(--surface);border:1px solid var(--hairline);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.materials-table{width:100%;border-collapse:collapse;}
.materials-table thead th{
  text-align:left;padding:14px 22px;
  font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--muted);font-weight:600;
  background:rgba(245,240,230,0.5);
  border-bottom:1px solid var(--hairline);
}
.materials-table th.num,.materials-table td.num{
  text-align:right;width:32%;white-space:nowrap;
}
.materials-table tbody td{
  padding:14px 22px;
  border-bottom:1px solid var(--hairline-soft);
  font-size:15px;color:var(--ink);
}
.materials-table tbody tr:last-child td{border-bottom:none;}
.materials-table tbody tr:hover{background:rgba(248,244,236,0.55);}
.materials-table .name{font-weight:500;}
.materials-table .num{
  font-variant-numeric:tabular-nums;
  color:var(--terracotta-deep);font-weight:600;
}
.empty-state{
  padding:56px 20px;text-align:center;
  color:var(--muted);font-size:14px;
}
.empty-state .e-icon{
  display:block;margin:0 auto 12px;width:32px;height:32px;
  opacity:0.4;
}

.footer-note{
  margin-top:24px;padding:16px 20px;
  background:rgba(245,240,230,0.55);
  border:1px dashed var(--hairline);
  border-radius:var(--radius);
  font-size:13px;color:var(--ink-soft);line-height:1.6;
}
.footer-note strong{color:var(--ink);font-weight:600;}
.footer-note a{
  color:var(--terracotta-deep);text-decoration:none;
  font-weight:500;border-bottom:1px solid var(--terracotta-soft);
}
.footer-note a:hover{border-bottom-color:var(--terracotta);}

/* === Responsive === */
@media (max-width:640px){
  .home,.detail{padding:20px 14px 60px;}
  .home-header{margin-bottom:20px;}
  .hotspot .hs-label{font-size:10px;padding:4px 8px;}
  .materials-table thead th{padding:12px 16px;font-size:10.5px;}
  .materials-table tbody td{padding:12px 16px;font-size:14px;}
  .materials-table th.num,.materials-table td.num{width:38%;}
  .detail-header{gap:12px;margin-bottom:20px;}
  .home-btn{width:40px;height:40px;}
  .zone-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
}

/* === Motion === */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(4px);}
  to{opacity:1;transform:translateY(0);}
}
.view{animation:fadeIn 0.22s ease-out;}
@media (prefers-reduced-motion:reduce){
  .view,.hotspot,.home-btn,.zone-card{animation:none !important;transition:none !important;}
}
</style>
</head>

/* === Render === */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function buildHotspots(){
  const c = document.getElementById('hotspots');
  HOTSPOTS.forEach(h=>{
    const b = document.createElement('button');
    b.className = 'hotspot';
    b.style.setProperty('--l', h.l + '%');
    b.style.setProperty('--t', h.t + '%');
    b.style.setProperty('--w', h.w + '%');
    b.style.setProperty('--h', h.h + '%');
    b.dataset.zone = h.zone;
    b.setAttribute('aria-label', h.label);
    b.innerHTML = '<span class="hs-label">' + escapeHtml(h.label) + '</span>';
    b.addEventListener('click', () => navigate(h.zone));
    c.appendChild(b);
  });
}

function buildZoneGrid(){
  const g = document.getElementById('zone-grid');
  ZONE_ORDER.forEach(code=>{
    const z = ZONES[code];
    if(!z) return;
    const card = document.createElement('button');
    card.className = 'zone-card';
    card.setAttribute('aria-label', z.name);
    card.innerHTML =
      '<span class="chip">' + escapeHtml(z.codeLabel || code) + '</span>' +
      '<span class="zc-text">' +
        '<span class="zc-name">' + escapeHtml(z.name) + '</span>' +
        (z.note ? '<span class="zc-sub">' + escapeHtml(z.note.split('·')[0].trim()) + '</span>' : '') +
      '</span>';
    card.addEventListener('click', () => navigate(code));
    g.appendChild(card);
  });
}

function renderDetail(code){
  const z = ZONES[code];
  if(!z){ showHome(); return; }

  document.getElementById('d-chip').textContent = code === 'TECH' ? 'TECH' : code + ' 区';
  document.getElementById('d-code').textContent = z.codeLabel || '';
  document.getElementById('d-name').textContent = z.name;
  document.getElementById('d-note').textContent = z.note || '';

  const tbody = document.getElementById('d-rows');
  if(!z.items || z.items.length === 0){
    tbody.innerHTML =
      '<tr><td colspan="2"><div class="empty-state">' +
        '<svg class="e-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="3" y="3" width="18" height="18" rx="2"/>' +
          '<path d="M3 9h18"/><path d="M9 21V9"/>' +
        '</svg>' +
        '该区物料清单待补充' +
      '</div></td></tr>';
  } else {
    tbody.innerHTML = z.items.map(it =>
      '<tr>' +
        '<td class="name">' + escapeHtml(it.name) + '</td>' +
        '<td class="num">' + escapeHtml(it.spec) + '</td>' +
      '</tr>'
    ).join('');
  }

  document.getElementById('home').hidden = true;
  document.getElementById('detail').hidden = false;
  window.scrollTo({top:0, behavior:'instant'});
}

function showHome(){
  document.getElementById('detail').hidden = true;
  document.getElementById('home').hidden = false;
  if(location.hash){
    history.replaceState(null,'',location.pathname + location.search);
  }
}

function navigate(code){
  if(!ZONES[code]) return;
  location.hash = 'zone-' + code.toLowerCase();
}

function handleHash(){
  const m = (location.hash || '').match(/^#zone-([a-z]+)/i);
  if(m){
    const code = m[1].toUpperCase();
    if(ZONES[code]){ renderDetail(code); return; }
  }
  document.getElementById('home').hidden = false;
  document.getElementById('detail').hidden = true;
}

/* === Wire up === */
buildHotspots();

document.getElementById('home-btn').addEventListener('click', showHome);

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && !document.getElementById('detail').hidden){
    showHome();
  }
});

window.addEventListener('hashchange', handleHash);
handleHash();
